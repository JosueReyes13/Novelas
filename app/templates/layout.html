<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Novelas{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Kaushan+Script|Roboto:300,400,900" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/darkmode.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="main-header">
        <div class="header-wrapper">
            <div class="main-logo">NOVELS</div>
            <nav>
                <ul class="main-menu">
                    <li><a href="{{ url_for('index') }}">Inicio</a></li>
                    <li><a href="#content">Biblioteca</a></li>
                    <li class="search-container">
                        <a href="#" id="search-toggle">
                            <span class="fa fa-search"></span>
                        </a>
                        <div class="search-form" id="search-form">
                            <input type="text" id="search-input" placeholder="Buscar novela..." autocomplete="off">
                            <div class="search-results" id="search-results"></div>
                        </div>
                    </li>
                    
                    <li class="theme-switch-wrapper">
                        <label class="theme-switch" for="theme-checkbox">
                            <input type="checkbox" id="theme-checkbox" />
                            <div class="slider round">
                                <i class="fa fa-sun-o sun-icon"></i>
                                <i class="fa fa-moon-o moon-icon"></i>
                            </div>
                        </label>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    {% if request.path == url_for('index') %}
    <section id="section-1">
        <div class="content-slider">
            <input type="radio" id="banner1" class="sec-1-input" name="banner" checked>
            <input type="radio" id="banner2" class="sec-1-input" name="banner">
            
            <div class="slider">
                <div id="top-banner-1" class="banner">
                    <div class="banner-inner-wrapper">
                        <h2>Tus historias favoritas</h2>
                        <h1>Bienvenido<br>al estante</h1>
                        <div class="line"></div>
                        <div class="learn-more-button"><a href="#content">Explorar</a></div>
                    </div>
                </div>
                <div id="top-banner-2" class="banner">
                    <div class="banner-inner-wrapper">
                        <h2>Solo por diversión</h2>
                        <h1>Disfruta<br>Diviertete</h1>
                        <div class="line"></div>
                        <div class="learn-more-button"><a href="#content">Explorar</a></div>
                    </div>
                </div>
            </div>

            <nav>
                <div class="controls">
                    <label for="banner1"><span class="progressbar"><span class="progressbar-fill"></span></span><span>01</span> Bienvenidos</label>
                    <label for="banner2"><span class="progressbar"><span class="progressbar-fill"></span></span><span>02</span> Disfruten</label>
                </div>
            </nav>
        </div>
    </section>
    {% endif %}

    <main id="content">
        {% block content %}{% endblock %}
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/buscar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/darkmode.js') }}"></script>
</body>
</html>
