{% extends "layout.html" %}

{% block title %} Mi Biblioteca {% endblock %}

{% block content %}
<section class="section-header">
    <h3>Tu Estante Personal</h3>
    <h2>Novelas Ligeras Disponibles</h2>
    <div class="line-red"></div>
</section>

<section class="novel-grid" style="display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; padding-bottom: 50px;">
    
    {% for novela in novelas %}
    <div class="novel-card" style="width: 220px; background: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; border-radius: 5px; overflow: hidden;">
        
        <div class="cover" style="height: 300px; background: #eee;">
            <img src="{{ url_for('static', filename='novelas/' + novela + '/portada.jpg') }}" 
                 alt="{{ novela }}" 
                 style="width: 100%; height: 100%; object-fit: cover;"
                 onerror="this.src='https://via.placeholder.com/220x300?text=Sin+Portada'">
        </div>

        <div class="info" style="padding: 15px;">
            <h4 style="margin-bottom: 10px; color: #333;">{{ novela }}</h4>
            
            <a href="{{ url_for('ver_novela', nombre=novela) }}" class="learn-more-button" style="font-size: 12px; border: 2px solid #f38181; color: #f38181; padding: 5px 10px; display: inline-block;">
                VER VOLÚMENES
            </a>
        </div>
    </div>
    {% else %}
    <p>Aún no has agregado carpetas en static/novelas/</p>
    {% endfor %}

</section>
{% endblock %}
